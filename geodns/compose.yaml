services:
  bind9:
    image: internetsystemsconsortium/bind9:9.18
    container_name: bind9
    restart: unless-stopped

    ports:
      - "53:53/udp"
      - "53:53/tcp"

    volumes:
      - ./bind/named.conf:/etc/bind/named.conf:ro
      - ./bind/named.conf.options:/etc/bind/named.conf.options:ro
      - ./bind/named.conf.local:/etc/bind/named.conf.local:ro
      - ./bind/acl:/etc/bind/acl:ro
      - ./bind/zones:/etc/bind/zones:ro
      - ./bind/named.conf.logging:/etc/bind/named.conf.logging:ro

    # IMPORTANT: just args; image already runs named
    command: ["-g", "-c", "/etc/bind/named.conf"]

